name: Auto Merge PR

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: github.event.pull_request.draft == false && github.event.pull_request.base.ref == 'master'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Enable PR auto-merge
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            if (pr.auto_merge !== null) {
              core.info('Auto-merge is already enabled.');
              return;
            }

            try {
              await github.graphql(
                `mutation($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $pullRequestId,
                    mergeMethod: SQUASH
                  }) {
                    pullRequest {
                      number
                    }
                  }
                }`,
                {
                  pullRequestId: pr.node_id
                }
              );
              core.info(`Enabled auto-merge for PR #${pr.number}.`);
            } catch (error) {
              core.setFailed(`Failed to enable auto-merge: ${error.message}`);
            }
